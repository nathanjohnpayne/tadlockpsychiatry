<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tadlock Psychiatry—01 · Editorial Noir</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Body becomes a flex column so the preview bar takes its natural
       height at the top and #root flexes to fill the remaining space.
       The direction's React component has its own `overflow: auto`
       inside #root, so its sticky NavBarD1 sticks BELOW the preview
       bar (relative to #root's scroll container) rather than sliding
       under the preview bar. */
    html, body, #root { margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; }
    body { background: #0E0F12; color: #E8E4DC; font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif; visibility: hidden; display: flex; flex-direction: column; }
    body.ready { visibility: visible; }
    * { box-sizing: border-box; }
    #root { flex: 1; min-height: 0; overflow: hidden; }

    /* Embedded preview bar — same vocabulary as the menu's topbar, on
       every gated page so "← MENU", brand mark, and Sign out have a
       permanent home that doesn't overlap the direction's chrome.

       position: relative + z-index establishes a stacking context above
       direction-1's full-viewport `position: fixed` overlays (spot
       z-index 1, grain z-index 2 in protected-src/direction-1.tsx);
       without it, those overlays render on top of the preview bar. */
    .preview-bar {
      flex: none;
      position: relative; z-index: 1000;
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
      padding: 18px 40px; border-bottom: 1px solid rgba(240,237,230,0.22);
      background: #0A0A0A; color: #F0EDE6;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 10.5px; letter-spacing: 1.6px; text-transform: uppercase;
    }
    .preview-bar .l, .preview-bar .r { display: flex; gap: 18px; align-items: center; }
    .preview-bar .r { justify-content: flex-end; color: rgba(240,237,230,0.55); }
    .preview-bar .sep { color: rgba(240,237,230,0.55); }
    .preview-bar a,
    .preview-bar button#signout {
      color: rgba(240,237,230,0.55); text-decoration: none; cursor: pointer;
    }
    /* Reset native <button> styling so #signout matches the surrounding
       monospace anchors. Keeps the element keyboard-focusable while
       inheriting the .preview-bar font + color treatment. */
    .preview-bar button#signout {
      background: none; border: 0; padding: 0; margin: 0;
      font: inherit; letter-spacing: inherit; text-transform: inherit;
    }
    .preview-bar a:hover,
    .preview-bar button#signout:hover { color: #F0EDE6; }
    .preview-bar a:focus-visible,
    .preview-bar button#signout:focus-visible {
      color: #F0EDE6; outline: 1px solid #F0EDE6; outline-offset: 3px;
    }
    .preview-bar .back { color: rgba(240,237,230,0.55); }
    .preview-bar .back:hover { color: #F0EDE6; }
    .preview-bar .ident { display: flex; align-items: center; gap: 10px; color: #F0EDE6; }
    .preview-bar .ident em { font-style: normal; color: rgba(240,237,230,0.55); }
    .preview-bar #who { color: #F0EDE6; }

    @media (max-width: 720px) {
      .preview-bar { padding: 12px 16px; grid-template-columns: 1fr auto; gap: 12px; font-size: 9.5px; }
      .preview-bar > div:nth-child(2) { display: none; }
      /* Hide only the "Signed in as" label on mobile, not the
         username (#who). CodeRabbit P1 on PR #17: the old
         `.r > span:first-child` selector dropped the whole
         "Signed in as <name>" container, so mobile users lost
         their identity readout entirely. */
      .preview-bar .r .signin-label { display: none; }
      .preview-bar .ident em { display: none; }
    }
  </style>
</head>
<body>
  <header class="preview-bar">
    <div class="l">
      <a href="/menu" class="back">← MENU</a>
      <span class="sep">·</span>
      <span class="ident">TADLOCK / PSYCHIATRY <em>· Private Preview</em></span>
    </div>
    <div></div>
    <div class="r">
      <span><span class="signin-label">Signed in as </span><span id="who">…</span></span>
      <button id="signout" type="button">Sign out</button>
    </div>
  </header>

  <div id="root"></div>

  <!-- Boot-phase fatal-error overlay. Scoped to boot only: once
       bootDirection() mounts and adds `body.ready`, the bootInProgress
       flag flips off so post-boot transient runtime errors (e.g.
       benign ResizeObserver chatter, third-party script noise) cannot
       replace a successfully-rendered page with the full-screen
       overlay. -->
  <script>
    (function () {
      var bootInProgress = true;
      function showFatal(label, detail) {
        if (!bootInProgress) return;
        document.body.classList.add("ready");
        document.body.style.cssText += "background:#0E0F12; color:#fff; font-family:'JetBrains Mono', ui-monospace, monospace;";
        var pre = document.createElement("pre");
        pre.style.cssText = "position:fixed; inset:0; padding:32px; margin:0; white-space:pre-wrap; overflow:auto; font-size:12px; color:#FF5C2A;";
        pre.textContent = "[d/1] " + label + "\n\n" + detail + "\n\n← back to /menu";
        document.body.appendChild(pre);
      }
      window.addEventListener("error", function (e) {
        showFatal("script error", (e.error && e.error.stack) || e.message || "(no detail)");
      });
      window.addEventListener("unhandledrejection", function (e) {
        showFatal("unhandled promise rejection", (e.reason && e.reason.stack) || String(e.reason));
      });
      // bootDirection() and the showBootError fallback both add
      // `ready` on the body — either is a definitive "boot phase
      // finished" signal. Watch the class list and flip the flag,
      // then disconnect so the observer doesn't keep firing.
      var obs = new MutationObserver(function () {
        if (document.body.classList.contains("ready")) {
          bootInProgress = false;
          obs.disconnect();
        }
      });
      obs.observe(document.body, { attributes: true, attributeFilter: ["class"] });
    })();
  </script>

  <script type="module">
    import { bootDirection } from "/src/direction-loader.ts";
    bootDirection({
      id: "1",
      tweaks: {
        dark: true,
        accent: "#C9A876",
        heroVariant: "monogram",
        serif: '"Cormorant Garamond", Georgia, serif',
        sans:  '"Inter", -apple-system, system-ui, sans-serif',
        mono:  '"JetBrains Mono", ui-monospace, monospace',
      },
    }).catch((err) => {
      console.error("[d/1] boot failed", err);
    });
  </script>
</body>
</html>
