<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tadlock Psychiatry — 01 · Editorial Noir</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/direction-responsive.css" />
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; width: 100%; }
    body { background: #0E0F12; color: #E8E4DC; font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif; visibility: hidden; }
    body.ready { visibility: visible; }
    * { box-sizing: border-box; }
    /* Return-to-menu affordance. Earlier version used mix-blend-mode: difference
       to read on any direction background, but it visibly overlapped each
       direction's nav brand text (gross checkered look). Switched to a small
       translucent dark pill with backdrop-blur — it sits on top of whatever's
       behind it as its own UI chip, doesn't blend with the nav text, and the
       white label reads on every direction (dark, paper, off-black) because
       the dark backdrop carries the contrast. */
    .menu-back {
      position: fixed; top: 12px; left: 12px; z-index: 9999;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 10.5px; letter-spacing: 1.6px; text-transform: uppercase;
      color: #ffffff;
      background: rgba(0,0,0,0.62);
      backdrop-filter: blur(10px) saturate(140%);
      -webkit-backdrop-filter: blur(10px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.14);
      text-decoration: none; padding: 8px 12px;
      border-radius: 999px;
      transition: opacity .25s ease, transform .25s ease, background .25s ease;
    }
    .menu-back:hover { background: rgba(0,0,0,0.82); transform: translateY(-1px); }
  </style>
</head>
<body>
  <a class="menu-back" href="/menu">← MENU</a>
  <div id="root"></div>

  <!-- React + Babel are public. The protected JSX (content.jsx, direction-1.jsx)
       and the practice portrait are fetched with an Authorization: Bearer header
       through Hosting rewrites that route to the protectedFile Cloud Function. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- Surface any pre-mount script error visibly. Without this, a module
       import 404 or a syntax error inside a /src/* file would leave the
       page on `body { visibility: hidden }` forever — the in-loader
       error fallback only fires for thrown exceptions inside
       bootDirection(), not for module-load failures. -->
  <script>
    (function () {
      function showFatal(label, detail) {
        document.body.classList.add("ready");
        document.body.style.cssText += "background:#0E0F12; color:#fff; font-family:'JetBrains Mono', ui-monospace, monospace;";
        var pre = document.createElement("pre");
        pre.style.cssText = "position:fixed; inset:0; padding:32px; margin:0; white-space:pre-wrap; overflow:auto; font-size:12px; color:#FF5C2A;";
        pre.textContent = "[d/1] " + label + "\n\n" + detail + "\n\n← back to /menu";
        document.body.appendChild(pre);
      }
      window.addEventListener("error", function (e) {
        showFatal("script error", (e.error && e.error.stack) || e.message || "(no detail)");
      });
      window.addEventListener("unhandledrejection", function (e) {
        showFatal("unhandled promise rejection", (e.reason && e.reason.stack) || String(e.reason));
      });
    })();
  </script>

  <script type="module">
    import { bootDirection } from "/src/direction-loader.js";
    bootDirection({
      id: "1",
      tweaks: {
        dark: true,
        accent: "#C9A876",
        heroVariant: "monogram",
        serif: '"Cormorant Garamond", Georgia, serif',
        sans:  '"Inter", -apple-system, system-ui, sans-serif',
        mono:  '"JetBrains Mono", ui-monospace, monospace',
      },
    }).catch((err) => {
      console.error("[d/1] boot failed", err);
    });
  </script>
</body>
</html>
