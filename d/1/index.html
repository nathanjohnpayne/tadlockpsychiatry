<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tadlock Psychiatry — 01 · Editorial Noir</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/direction-responsive.css" />
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; width: 100%; }
    body { background: #0E0F12; color: #E8E4DC; font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif; visibility: hidden; }
    body.ready { visibility: visible; }
    * { box-sizing: border-box; }
    /* Return-to-menu affordance — neutral on any direction via difference blend. */
    .menu-back {
      position: fixed; top: 16px; left: 24px; z-index: 9999;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 10.5px; letter-spacing: 1.6px; text-transform: uppercase;
      color: #ffffff; mix-blend-mode: difference;
      text-decoration: none; padding: 6px 8px;
      transition: opacity .25s ease;
    }
    .menu-back:hover { opacity: 0.65; }
  </style>
</head>
<body>
  <a class="menu-back" href="/menu">← MENU</a>
  <div id="root"></div>

  <!-- React + Babel are public. The protected JSX (content.jsx, direction-1.jsx)
       and the practice portrait are fetched with an Authorization: Bearer header
       through Hosting rewrites that route to the protectedFile Cloud Function. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="module">
    import { bootDirection } from "/src/direction-loader.js";
    bootDirection({
      id: "1",
      tweaks: {
        dark: true,
        accent: "#C9A876",
        heroVariant: "monogram",
        serif: '"Cormorant Garamond", Georgia, serif',
        sans:  '"Inter", -apple-system, system-ui, sans-serif',
        mono:  '"JetBrains Mono", ui-monospace, monospace',
      },
    }).catch((err) => {
      console.error("[d/1] boot failed", err);
    });
  </script>
</body>
</html>
