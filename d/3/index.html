<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tadlock Psychiatry — 03 · Architectural Performance</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/direction-responsive.css" />
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; width: 100%; }
    body { background: #EFEDE7; color: #0A0A0A; font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif; visibility: hidden; }
    body.ready { visibility: visible; }
    * { box-sizing: border-box; }
    /* See d/1/index.html for the rationale on the chip-with-backdrop pattern. */
    .menu-back {
      position: fixed; top: 12px; left: 12px; z-index: 9999;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 10.5px; letter-spacing: 1.6px; text-transform: uppercase;
      color: #ffffff;
      background: rgba(0,0,0,0.62);
      backdrop-filter: blur(10px) saturate(140%);
      -webkit-backdrop-filter: blur(10px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.14);
      text-decoration: none; padding: 8px 12px;
      border-radius: 999px;
      transition: opacity .25s ease, transform .25s ease, background .25s ease;
    }
    .menu-back:hover { background: rgba(0,0,0,0.82); transform: translateY(-1px); }
  </style>
</head>
<body>
  <a class="menu-back" href="/menu">← MENU</a>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- See d/1/index.html for the rationale on the global error / rejection
       handlers. Mirrored here so a module-load failure is visible
       instead of leaving body { visibility: hidden } forever. -->
  <script>
    (function () {
      function showFatal(label, detail) {
        document.body.classList.add("ready");
        document.body.style.cssText += "background:#EFEDE7; color:#0A0A0A; font-family:'JetBrains Mono', ui-monospace, monospace;";
        var pre = document.createElement("pre");
        pre.style.cssText = "position:fixed; inset:0; padding:32px; margin:0; white-space:pre-wrap; overflow:auto; font-size:12px; color:#FF5C2A;";
        pre.textContent = "[d/3] " + label + "\n\n" + detail + "\n\n← back to /menu";
        document.body.appendChild(pre);
      }
      window.addEventListener("error", function (e) {
        showFatal("script error", (e.error && e.error.stack) || e.message || "(no detail)");
      });
      window.addEventListener("unhandledrejection", function (e) {
        showFatal("unhandled promise rejection", (e.reason && e.reason.stack) || String(e.reason));
      });
    })();
  </script>

  <script type="module">
    import { bootDirection } from "/src/direction-loader.js";
    bootDirection({
      id: "3",
      tweaks: {
        dark: false,
        accent: "#FF5C2A",
        heroVariant: "blocks",
        sans: '"Inter", -apple-system, system-ui, sans-serif',
        mono: '"JetBrains Mono", ui-monospace, monospace',
      },
    }).catch((err) => {
      console.error("[d/3] boot failed", err);
    });
  </script>
</body>
</html>
