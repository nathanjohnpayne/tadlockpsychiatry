name: Dependabot Auto-merge
# Approves and squash-merges Dependabot patch/minor updates when CI passes.
# Major version bumps are left for manual review.
#
# Uses pull_request_target so the workflow has write permissions even when
# Dependabot's restricted GITHUB_TOKEN is in effect.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      # Check out the BASE ref (the target branch's tip), NOT the PR
      # HEAD. This workflow runs under pull_request_target which has
      # write permissions and access to secrets — checking out PR-author-
      # controlled code (HEAD) and reading config from it would be a
      # privilege escalation surface. We only need the BASE's
      # .github/review-policy.yml for the available_reviewers
      # validation in the next step. github.event.pull_request.base.sha
      # is the merge target's tip at the moment the PR opened.
      # codex r2 on PR #179 caught the missing checkout.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          # Don't persist the checkout token — we use REVIEWER_ASSIGNMENT_TOKEN
          # for the gh calls below, not the default GITHUB_TOKEN.
          persist-credentials: false

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      - name: Approve and merge patch/minor + dev-dependency-group updates
        # Single patch/minor updates, plus the `dev-dependencies` GROUP
        # (whatever its highest bump — dev tooling major bumps are
        # low-risk and still gated by CI-green + the reviewer-identity
        # approval + the available_reviewers allowlist below). Grouped
        # dev updates whose highest member is major were previously
        # skipped here (update-type=major), fell through to a manual
        # merge with no reviewer approval, and tripped the weekly audit
        # (#374 Pattern A — matchline#245). Production groups + non-group
        # major bumps still require manual review.
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.dependency-group == 'dev-dependencies'
        run: |
          set -euo pipefail

          # Verify GH_TOKEN is set and resolves to a reviewer identity.
          # The 2026-04-27 weekly PR audit caught 17 of 21 violations
          # across 6 repos where Dependabot PRs merged without a
          # reviewer-identity approval recorded — root cause was either
          # an empty REVIEWER_ASSIGNMENT_TOKEN secret (the approve call
          # silently no-op'd while the merge proceeded) or the token
          # resolving to nathanjohnpayne, which GitHub rejects with
          # "can't approve own pull request". Both modes left the PR
          # merged with no approval audit trail.
          # Closes nathanjohnpayne/mergepath#160 from the template side.
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::GH_TOKEN is empty. REVIEWER_ASSIGNMENT_TOKEN secret is not set in this repo."
            echo "::error::Add a reviewer-identity PAT to repo Settings → Secrets and variables → Actions → REVIEWER_ASSIGNMENT_TOKEN."
            exit 1
          fi

          ACTING_AS=$(gh api user --jq .login 2>/dev/null || true)
          if [ -z "$ACTING_AS" ]; then
            echo "::error::gh api user returned empty — REVIEWER_ASSIGNMENT_TOKEN may be invalid, expired, or lacks the user scope."
            exit 1
          fi
          echo "::notice::Approving $PR_URL as $ACTING_AS (PR author: $PR_AUTHOR)"

          # Verify AUTHOR_MERGE_TOKEN is set and resolves to an
          # author-identity login. Same audit-trail risk as the
          # reviewer-token mode (#160): an empty AUTHOR_MERGE_TOKEN
          # would silently fall back to gh's default credential
          # resolution and record the merge under whatever identity
          # the workflow's GITHUB_TOKEN or implicit creds resolve to.
          # Hard-fail instead so consumer repos that haven't added
          # the secret yet get a clear error rather than a wrong
          # mergedBy attribution.
          if [ -z "${AUTHOR_MERGE_TOKEN:-}" ]; then
            echo "::error::AUTHOR_MERGE_TOKEN is empty. AUTHOR_MERGE_TOKEN secret is not set in this repo."
            echo "::error::Add an author-identity PAT (nathanjohnpayne) to repo Settings → Secrets and variables → Actions → AUTHOR_MERGE_TOKEN."
            exit 1
          fi
          MERGE_AS=$(GH_TOKEN="$AUTHOR_MERGE_TOKEN" gh api user --jq .login 2>/dev/null || true)
          if [ -z "$MERGE_AS" ]; then
            echo "::error::gh api user with AUTHOR_MERGE_TOKEN returned empty — AUTHOR_MERGE_TOKEN may be invalid, expired, or lacks the user scope."
            exit 1
          fi
          echo "::notice::Merge will be performed as $MERGE_AS."


          require_current_head_check_success() {
            local sha runs conclusion status wait_seconds poll_seconds deadline required_check_name
            required_check_name=${REQUIRED_HEAD_CHECK_NAME:-lint}
            wait_seconds=${TEST_CHECK_WAIT_SECONDS:-1200}
            poll_seconds=${TEST_CHECK_POLL_SECONDS:-15}
            deadline=$((SECONDS + wait_seconds))
            sha=$(gh pr view "$PR_URL" --json headRefOid --jq .headRefOid)
            while :; do
              runs=$(gh api "repos/${GITHUB_REPOSITORY}/commits/$sha/check-runs?per_page=100" \
                | jq -c --arg check "$required_check_name" '[.check_runs[] | select(.name == $check)] | sort_by(.started_at // .created_at) | last // empty')
              if [ -n "$runs" ]; then
                status=$(printf '%s' "$runs" | jq -r '.status')
                conclusion=$(printf '%s' "$runs" | jq -r '.conclusion // ""')
                if [ "$status" = "completed" ]; then
                  if [ "$conclusion" = "success" ]; then
                    CURRENT_HEAD_SHA="$sha"
                    echo "::notice::Required check run '$required_check_name' is successful on current HEAD $CURRENT_HEAD_SHA."
                    return 0
                  fi
                  echo "::error::Required check run '$required_check_name' failed on current HEAD $sha (conclusion=${conclusion:-none}); refusing auto-merge."
                  exit 1
                fi
                echo "::notice::Required check run '$required_check_name' is $status on current HEAD $sha; waiting for completion."
              else
                echo "::notice::Required check run '$required_check_name' is absent on current HEAD $sha; waiting for it to start."
              fi
              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "::error::Required check run '$required_check_name' did not complete successfully within ${wait_seconds}s on current HEAD $sha; refusing auto-merge."
                exit 1
              fi
              sleep "$poll_seconds"
            done
            echo "::error::Required check run '$required_check_name' wait loop ended unexpectedly; refusing auto-merge."
            exit 1
          }

          has_human_hold() {
            local labels
            if ! labels=$(gh pr view "$PR_URL" --json labels --jq '.labels[].name'); then
              echo "::error::Failed to read labels for $PR_URL while checking human-hold."
              exit 1
            fi
            printf '%s\n' "$labels" | grep -Fxq human-hold
          }

          # `human-hold` is a human-remove-only hard freeze. Re-read
          # labels at runtime so a hold added while this job is queued
          # or waiting cannot be bypassed by the trigger-time payload.
          if has_human_hold; then
            echo "::notice::PR carries human-hold; skipping Dependabot auto-merge until the human removes the label."
            exit 0
          fi

          # Self-approval guard. The real condition is "the reviewer
          # token resolves to the PR's own author" — GitHub blocks
          # that. The previous check hard-coded `nathanjohnpayne`,
          # which is wrong here: a Dependabot PR's author is
          # `dependabot[bot]`, never `nathanjohnpayne`, so the old
          # check rejected a perfectly valid reviewer token while
          # never actually testing the self-approval condition.
          # Compare against the actual PR author. (CodeRabbit Major,
          # #271.) The available_reviewers validation below is the
          # broader gate — it independently rejects any ACTING_AS not
          # in the reviewer-identity allowlist.
          if [ "$ACTING_AS" = "$PR_AUTHOR" ]; then
            echo "::error::REVIEWER_ASSIGNMENT_TOKEN resolves to '$ACTING_AS', the PR's own author."
            echo "::error::GitHub blocks self-approval, so the approve call would silently fail and the merge would proceed without an approval recorded."
            echo "::error::Replace the secret with a distinct reviewer-identity PAT (nathanpayne-claude / -cursor / -codex)."
            exit 1
          fi

          # Validate ACTING_AS against available_reviewers in
          # .github/review-policy.yml. Codex r1 (Phase 4b) on PR #179:
          # without this check, any non-author write-collaborator
          # token (e.g., a contractor's PAT, github-actions[bot]) could
          # approve+merge and the workflow would exit 0 — but the next
          # weekly audit would still flag the PR as "not approved by a
          # known reviewer identity," same audit trail problem #160 set
          # out to fix.
          POLICY=".github/review-policy.yml"
          if [ ! -f "$POLICY" ]; then
            echo "::error::$POLICY not found — cannot validate $ACTING_AS against available_reviewers."
            exit 1
          fi
          # Same awk extractor used by scripts/codex-review-check.sh
          # (in-block list parser; sed strips list-marker + optional
          # quotes). Outputs one reviewer login per line.
          ALLOWED=$(awk '
            /^available_reviewers:/ {in_block=1; next}
            in_block && /^[^[:space:]#]/ {in_block=0}
            in_block && /^ *-/ {print}
          ' "$POLICY" | sed -E 's/^[[:space:]]*-[[:space:]]*"?([^"]*)"?[[:space:]]*$/\1/')
          if [ -z "$ALLOWED" ]; then
            echo "::error::$POLICY has no available_reviewers list. Add reviewer identities under available_reviewers: before this workflow can approve."
            exit 1
          fi
          if ! printf '%s\n' "$ALLOWED" | grep -Fxq "$ACTING_AS"; then
            echo "::error::REVIEWER_ASSIGNMENT_TOKEN resolves to '$ACTING_AS', which is NOT in $POLICY available_reviewers:"
            printf '%s\n' "$ALLOWED" | sed 's/^/::error::  - /'
            echo "::error::Even if this identity has write access to the repo, an approval from it would fail the next weekly audit ('approval not from a recognized reviewer identity')."
            echo "::error::Replace the secret with a PAT for one of the listed reviewers."
            exit 1
          fi

          # Defensive: the author identity (used for the merge) must
          # not also be a reviewer identity. If AUTHOR_MERGE_TOKEN
          # resolved into available_reviewers, we'd be re-using a
          # reviewer-identity PAT — defeating the whole point of the
          # split and producing the same mergedBy=reviewer attribution
          # the split is meant to fix.
          if printf '%s\n' "$ALLOWED" | grep -Fxq "$MERGE_AS"; then
            echo "::error::AUTHOR_MERGE_TOKEN resolves to '$MERGE_AS', which IS in $POLICY available_reviewers:"
            printf '%s\n' "$ALLOWED" | sed 's/^/::error::  - /'
            echo "::error::AUTHOR_MERGE_TOKEN must be a PAT for the documented author identity (nathanjohnpayne), not a reviewer-identity bot account."
            exit 1
          fi

          # Codex P2 (#426): excluding reviewer identities is necessary
          # but not sufficient. Any OTHER write-collaborator/bot token
          # that is not a reviewer would pass the check above yet still
          # record mergedBy as a non-author account — the same policy
          # violation this split is meant to fix. Positively require the
          # merge identity to equal author_identity, resolved with the
          # same awk parser agent-review.yml uses (quote/comment-safe,
          # nathanjohnpayne fallback). REVIEW_POLICY.md: "Only
          # nathanjohnpayne merges to the target branch."
          EXPECTED_AUTHOR=$(awk '
            /^[^[:space:]]/ && $1 == "author_identity:" {
              sub(/^[[:space:]]*[^:]+:[[:space:]]*/, "", $0)
              gsub(/^"/, "", $0)
              gsub(/^\047/, "", $0)
              gsub(/"[[:space:]]*(#.*)?$/, "", $0)
              gsub(/\047[[:space:]]*(#.*)?$/, "", $0)
              gsub(/[[:space:]]*#.*$/, "", $0)
              sub(/[[:space:]]+$/, "", $0)
              print
              exit
            }
          ' "$POLICY")
          EXPECTED_AUTHOR="${EXPECTED_AUTHOR:-nathanjohnpayne}"
          if [ "$MERGE_AS" != "$EXPECTED_AUTHOR" ]; then
            echo "::error::AUTHOR_MERGE_TOKEN resolves to '$MERGE_AS', expected author_identity '$EXPECTED_AUTHOR' (REVIEW_POLICY.md: only the author merges to the target branch)."
            echo "::error::Replace the secret with a PAT for '$EXPECTED_AUTHOR'."
            exit 1
          fi

          # Approve. set -e ensures we abort on failure rather than
          # continuing to the merge step with no approval on record.
          gh pr review --approve "$PR_URL"

          # Major dev-group bumps must NOT merge before CI (mergepath#406).
          # A semver-MAJOR update only reaches this step via the
          # `dependency-group == 'dev-dependencies'` arm of the job `if:`
          # (single bumps set update-type to patch/minor). The safety case
          # for auto-merging a dev group is explicitly "CI is green" — but
          # `gh pr merge --auto` merges as soon as the repo's *required*
          # status checks pass, NOT after arbitrary in-flight CI. In a
          # consumer where auto-merge is enabled yet CI is not a required
          # status check, the approval above already satisfies the merge
          # requirements, so `--auto` would merge the major dev-group BEFORE
          # CI finishes. The immediate-squash fallback below already guarded
          # this case; the `--auto` path did not (Codex P2 on #405 → #406).
          # Skip BOTH merge paths for a major dev-group and leave it
          # approved-but-unmerged: the approval is on record (the weekly
          # audit's "no reviewer approval" gate is satisfied), and a human
          # merges after CI — or `--auto` becomes safe once required CI
          # checks are configured. Patch/minor fall through to the path below.
          if [ "$UPDATE_TYPE" != "version-update:semver-patch" ] && \
             [ "$UPDATE_TYPE" != "version-update:semver-minor" ]; then
            echo "::notice::update-type='$UPDATE_TYPE' (dependency-group='$DEPENDENCY_GROUP') is a major dev-group bump; leaving it approved-but-unmerged to preserve the CI-green safety case (mergepath#406). Merge after CI, or enable required CI checks + auto-merge."
            exit 0
          fi

          require_current_head_check_success

          # Try GitHub-side auto-merge first (fires when required
          # checks pass). Fall back to an immediate squash ONLY when
          # the failure cause is "auto-merge unavailable" — i.e., the
          # repo doesn't have branch protection / auto-merge enabled
          # in settings. Other failures (network, permissions, race,
          # invalid token) propagate so the audit sees them.
          #
          # CodeRabbit on PR #179 caught that the prior bare-`||`
          # fallback would silently retry on ANY failure mode,
          # including transient errors that should bubble up. gh CLI
          # returns exit 1 for all merge failures without a
          # distinguishing exit code, so we pattern-match stderr for
          # the documented auto-merge-unavailable GraphQL messages.
          if has_human_hold; then
            echo "::notice::PR carries human-hold immediately before --auto; skipping Dependabot auto-merge until the human removes the label."
            exit 0
          fi
          set +e
          AUTO_STDERR=$(GH_TOKEN="$AUTHOR_MERGE_TOKEN" gh pr merge --squash --auto --match-head-commit "$CURRENT_HEAD_SHA" "$PR_URL" 2>&1 1>/dev/null)
          AUTO_RC=$?
          set -e
          if [ "$AUTO_RC" -eq 0 ]; then
            echo "$AUTO_STDERR"
            exit 0
          fi
          echo "$AUTO_STDERR" >&2
          if echo "$AUTO_STDERR" | grep -qiE 'auto[- ]?merge is not available|not in the correct state to enable auto[- ]?merge|auto[- ]?merge.*disabled|enablePullRequestAutoMerge'; then
            echo "::notice::--auto unavailable on this repo (likely no branch protection); falling back to immediate squash."
            if has_human_hold; then
              echo "::notice::PR carries human-hold immediately before fallback squash; skipping Dependabot auto-merge until the human removes the label."
              exit 0
            fi
            require_current_head_check_success
            if has_human_hold; then
              echo "::notice::PR carries human-hold after test wait; skipping Dependabot auto-merge until the human removes the label."
              exit 0
            fi
            # The immediate (no --auto) squash does NOT wait for CI. That's
            # acceptable for single patch/minor bumps (the long-standing
            # behavior). Major dev-groups are already held approved-but-
            # unmerged by the early guard above (mergepath#406), so they
            # should never reach this fallback — the `if` below is a
            # defensive backstop that re-checks update-type in case that
            # early guard is ever removed, keeping the CI-green safety case
            # double-guarded. For a major group, leave the PR APPROVED but
            # unmerged — --auto will merge it once branch protection/required
            # checks are configured, or a human merges after CI. The approval
            # is already recorded, so the weekly audit's "no reviewer
            # approval" gate is satisfied either way.
            if [ "$UPDATE_TYPE" = "version-update:semver-patch" ] || \
               [ "$UPDATE_TYPE" = "version-update:semver-minor" ]; then
              GH_TOKEN="$AUTHOR_MERGE_TOKEN" gh pr merge --squash --match-head-commit "$CURRENT_HEAD_SHA" "$PR_URL"
            else
              echo "::notice::update-type='$UPDATE_TYPE' (dependency-group='$DEPENDENCY_GROUP') is not patch/minor and --auto is unavailable; leaving the PR approved-but-unmerged to preserve the CI-green safety case. Configure branch protection/auto-merge or merge manually after CI."
              exit 0
            fi
          else
            echo "::error::gh pr merge --auto failed for a non-auto-merge-unavailable reason. See stderr above. Not falling back to immediate squash; surface to audit."
            exit "$AUTO_RC"
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          # The actual PR author — `dependabot[bot]` for these events.
          # Used for the genuine self-approval guard below (a hard-
          # coded `nathanjohnpayne` compare was wrong: the author of a
          # Dependabot PR is never `nathanjohnpayne`). (CodeRabbit
          # Major, #271.)
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          # Dependabot metadata — used by the immediate-squash fallback to
          # keep major dev-group bumps behind CI (#374 / Codex P2 on #405).
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEPENDENCY_GROUP: ${{ steps.metadata.outputs.dependency-group }}
          REQUIRED_HEAD_CHECK_NAME: lint
          GH_TOKEN: ${{ secrets.REVIEWER_ASSIGNMENT_TOKEN }}
          # Author-identity PAT (nathanjohnpayne) used for the merge
          # step only. Reviewer-identity --approve must stay on
          # REVIEWER_ASSIGNMENT_TOKEN above; the merge itself should
          # record as the author identity per REVIEW_POLICY.md
          # ("Only nathanjohnpayne merges to the target branch").
          # When both tokens were the reviewer's, `mergedBy` came
          # back as the reviewer on every Dependabot merge — the
          # audit trail was correct for the approval and wrong for
          # the merge.
          AUTHOR_MERGE_TOKEN: ${{ secrets.AUTHOR_MERGE_TOKEN }}
