name: Auto-clear blocking labels

# Closes the manual-label-removal toil documented in #191.
#
# When the codex-review-check.sh merge gate clears (CI green +
# reviewer-identity APPROVED + Codex cleared on HEAD), this workflow
# removes the `needs-external-review` label automatically. Without it,
# every over-threshold PR requires the human to do
# `gh pr edit <N> --remove-label needs-external-review` after agents
# have done all the actual review work.
#
# Scope: ONLY removes `needs-external-review`. `needs-human-review`,
# `policy-violation`, and `human-hold` remain manual-only by design (see
# REVIEW_POLICY.md § Agent prohibitions). The doctrine carve-out for
# this workflow ships in #196.

on:
  pull_request_target:
    types: [synchronize, labeled, unlabeled]
  pull_request_review:
    types: [submitted]
  # workflow_run fires on completion of OTHER workflows. We target
  # the three that produce the required-check signals codex-review-
  # check.sh inspects: PR Review Policy (Label Gate, Self-Review,
  # External Review Check), Agent Review Pipeline (auto-merge-on-
  # approval, detect-disagreement, etc.), and repo-lint (lint).
  # This replaces the prior `check_suite` trigger, which (per codex
  # P1 on PR #202) does NOT fire for suites created by GitHub
  # Actions — only for external CI providers. Without workflow_run,
  # the common path of "reviewer approves → Actions CI catches up →
  # gate now passes" produced no event and the label stayed stuck.
  workflow_run:
    workflows:
      - "PR Review Policy"
      - "Agent Review Pipeline"
      - "repo-lint"
    types: [completed]
  # Periodic sweep — catches the 👍-after-last-push case (codex
  # reacts on the PR issue but no synchronize / review / workflow_run
  # event fires, so the event-driven path stays inert). Runs every
  # 5 minutes against any open PR carrying needs-external-review.
  # Idempotent (no-op when label absent or gate not yet met). Sub-C
  # of #191. See scheduled-sweep job below for the cadence knob.
  #
  # Tightened from 15→5 min in mergepath#324 to close the
  # 👍-after-last-push gap observed across the mergepath#250 Phase D
  # propagation fanout (3 of 6 consumer PRs needed manual
  # request-label-removal.sh because no event-driven trigger
  # fired and the prior 15-min sweep stranded them for up to 15 min
  # after Codex cleared). 3× the API quota cost, but a meaningfully
  # shorter blocker window. The PAT-driven label removal added in
  # #324 also helps — but the sweep is still the only backstop for
  # the no-event path.
  schedule:
    - cron: '*/5 * * * *'

permissions:
  pull-requests: write
  contents: read
  # codex-review-check.sh drills statusCheckRollup →
  # checkSuite.workflowRun, which needs `actions: read` in addition
  # to the `checks` scope. Without it the GraphQL fails with `Resource
  # not accessible by integration` and the gate evaluation aborts
  # with rc=3, leaving `needs-external-review` stuck on every
  # consumer PR after Codex approves. Surfaced on
  # nathanjohnpayne/matchline#233 (#306 propagation canary); see
  # #310 for the full repro + permission scope rationale.
  actions: read
  # `issues: read` is required because codex-review-check.sh reads
  # issues-scoped endpoints: /issues/{pr}/reactions (Codex 👍
  # clearance) and /issues/{pr}/timeline (force-push anchor). On a
  # restricted-default GITHUB_TOKEN an omitted scope defaults to
  # `none`, so those reads 403 and the gate aborts with rc=3,
  # leaving `needs-external-review` stuck even after Codex clears.
  # Same class as the merge-clearance-gate.yml fix on PR #429; see
  # #431.
  issues: read
  # `checks: write` is required so the "Surface infra failure as
  # check-run" step (#324) can POST a failed check-run to the PR's
  # checks tab when this workflow hits an infrastructure error
  # (failed label read, failed label removal, codex-review-check.sh
  # rc=3, contract-drift rc). Without a visible check-run, flake
  # recurrences are invisible unless someone happens to look at the
  # workflow run log. `write` supersets `read`, so this single entry
  # also covers codex-review-check.sh's check-reading need — do NOT
  # re-add a separate `checks: read` key: a duplicate `checks:` map
  # key is a startup-failure-level workflow file error (#324 shipped
  # exactly that regression; the parser rejected the file and every
  # trigger produced a zero-job failed run, so the label never
  # auto-cleared).
  checks: write

jobs:
  evaluate-and-clear:
    name: Re-evaluate codex-review-check gate
    runs-on: ubuntu-latest
    # Self-fire loop guard: when this workflow's label removal fires
    # the `unlabeled` event for `needs-external-review`, skip — we
    # just removed it; nothing to do.
    # Schedule guard: cron runs the scheduled-sweep job below; the
    # event-driven path is moot for scheduled invocations. CR Major
    # on PR #213 r2 — without this, every 15-min cron paid for an
    # extra checkout-only no-op job.
    if: |
      github.event_name != 'schedule' &&
      !(
        github.event_name == 'pull_request_target' &&
        github.event.action == 'unlabeled' &&
        github.event.label.name == 'needs-external-review'
      )
    steps:
      - name: Checkout repo (for codex-review-check.sh)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # SECURITY: pin to the default branch so we always run the
          # TRUSTED copy of scripts/codex-review-check.sh — never the
          # PR's own version. Without this, on pull_request_review
          # events GITHUB_REF defaults to refs/pull/<N>/merge and
          # actions/checkout pulls the PR's HEAD; combined with this
          # workflow's `pull-requests: write` permission, a malicious
          # PR could modify the gate script to remove arbitrary labels
          # or post arbitrary comments. CR Critical on PR #202 r2.
          ref: ${{ github.event.repository.default_branch }}
          # Need full history so codex-review-check can inspect the
          # PR HEAD against base. The script doesn't currently do that
          # but a future tightening might.
          fetch-depth: 0

      - name: Resolve PR number from event
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_JSON: ${{ toJSON(github.event) }}
        run: |
          # Each event surfaces PR number(s) differently. Emit a
          # newline-separated list (most events have exactly one PR).
          # workflow_run.completed can attach to multiple PRs in
          # principle, so we enumerate.
          case "$EVENT_NAME" in
            pull_request_target|pull_request_review)
              prs=$(jq -r '.pull_request.number' <<<"$EVENT_JSON")
              ;;
            workflow_run)
              # Only act on successful runs of the listened workflows;
              # a failed lint or PR Review Policy run won't have
              # changed the gate state, so don't bother re-evaluating.
              conclusion=$(jq -r '.workflow_run.conclusion' <<<"$EVENT_JSON")
              if [ "$conclusion" != "success" ]; then
                echo "workflow_run conclusion=$conclusion (not success); skipping." >&2
                echo "numbers=" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              prs=$(jq -r '.workflow_run.pull_requests[].number' <<<"$EVENT_JSON")
              ;;
            *)
              echo "Unsupported event: $EVENT_NAME" >&2
              exit 0  # don't fail; just skip
              ;;
          esac
          if [ -z "$prs" ]; then
            echo "No PR number resolvable from event; skipping." >&2
            echo "numbers=" >> "$GITHUB_OUTPUT"
          else
            # Multi-line output: use a heredoc per Actions docs.
            {
              echo 'numbers<<EOF'
              echo "$prs"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Re-evaluate gate per PR + remove label on pass
        if: steps.pr.outputs.numbers != ''
        env:
          # PAT-driven label removal (#315/#324). GITHUB_TOKEN-driven
          # events do NOT trigger downstream workflows (recursion
          # prevention) — pr-review-policy.yml's Label Gate would
          # stay stuck on the pre-clear failure state until the next
          # push or label toggle. A PAT-driven event triggers
          # downstream workflows normally, so Label Gate re-fires and
          # mergeStateStatus flips to CLEAN within seconds rather
          # than stalling until something else fires the policy
          # workflow. Closes mergepath#315. Token is the same
          # REVIEWER_ASSIGNMENT_TOKEN used by
          # .github/workflows/daily-feedback-rollup.yml.
          GH_TOKEN: ${{ secrets.REVIEWER_ASSIGNMENT_TOKEN }}
          PR_NUMBERS: ${{ steps.pr.outputs.numbers }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Source the gh-retry helper (#324). with_gh_retry wraps gh
          # calls in 3×30s retry on transient failures (HTTP 5xx,
          # rate-limit, "Resource not accessible by integration") so a
          # flaky read or write doesn't silently leave the label stuck.
          source scripts/lib/gh-retry-helpers.sh
          # codex-review-check.sh exits:
          #   0 = gate passes
          #   1 = gate fails (one or more of CI/reviewer/codex not met)
          #   3 = config/arg error (real infrastructure failure)
          # CR Major on PR #202 r1: every gh call gets explicit error
          # handling so a transient failure (rate limit, 5xx) on one
          # PR doesn't abort the sweep, AND no early gh failure is
          # silently swallowed by an asymmetric set -e/+e dance.
          # CR Major on PR #202 r2: rc=3 (infrastructure error) sets a
          # sentinel; after the sweep finishes we exit non-zero if any
          # PR hit it, so the workflow doesn't go green when gate
          # evaluation was actually impossible.
          had_infra_error=0
          failing_prs=""
          while IFS= read -r PR; do
            [ -z "$PR" ] && continue
            echo "::group::Evaluating PR #$PR"

            # Skip if label not present (no-op, common case on
            # synchronize/workflow_run for under-threshold PRs).
            if ! HAS_LABEL=$(with_gh_retry gh pr view "$PR" --repo "$REPO" --json labels \
              --jq '[.labels[].name] | contains(["needs-external-review"])'); then
              # Infra error — NOT a warning-only skip. This workflow
              # exists to clear a merge-blocking label; if it can't even
              # read the label state, it must NOT report success. A
              # rate-limit / network / API error here previously let
              # the job go green while a PR stayed stuck. (CodeRabbit
              # Major, #271.)
              echo "::error::Failed to query labels for PR #$PR — cannot evaluate."
              had_infra_error=1
              failing_prs="$failing_prs $PR"
              echo "::endgroup::"
              continue
            fi
            if [ "$HAS_LABEL" != "true" ]; then
              echo "Label needs-external-review not present; nothing to clear."
              echo "::endgroup::"
              continue
            fi

            set +e
            scripts/codex-review-check.sh "$PR"
            rc=$?
            set -e

            case "$rc" in
              0)
                echo "Gate passes — removing needs-external-review label."
                # Single (non-retried) removal of the non-idempotent write,
                # then verify end state with a retried READ (#465): retrying
                # --remove-label can double-fire downstream label-event
                # workflows and can hit a post-success "label not found" that
                # looks transient. Authoritative success = the label is gone,
                # not the write's exit code (still fail-closed per #271).
                gh pr edit "$PR" --repo "$REPO" --remove-label needs-external-review 2>/dev/null || true
                still_present=$(with_gh_retry gh pr view "$PR" --repo "$REPO" --json labels --jq 'any(.labels[]?; .name == "needs-external-review")' || echo "unknown")
                if [ "$still_present" != "false" ]; then
                  echo "::error::Failed to remove needs-external-review on PR #$PR — label still stuck (state: $still_present)."
                  had_infra_error=1
                  failing_prs="$failing_prs $PR"
                  echo "::endgroup::"
                  continue
                fi
                # Direct string body (NOT a heredoc — heredoc closing
                # delimiter must be column-0 unless using `<<-` with
                # tabs; YAML run blocks make that brittle).
                comment_body='**Automated label removal.** `scripts/codex-review-check.sh` cleared the merge gate on this HEAD (CI green + reviewer-identity APPROVED + Codex cleared). Removed `needs-external-review` so Label Gate passes and the PR can merge. See [.github/workflows/auto-clear-blocking-labels.yml](.github/workflows/auto-clear-blocking-labels.yml) (#191/#195) for the trigger doctrine.'
                with_gh_retry gh pr comment "$PR" --repo "$REPO" --body "$comment_body" \
                  || echo "::warning::Failed to post attribution comment for PR #$PR"
                ;;
              1)
                echo "Gate not yet met — leaving label in place."
                ;;
              3)
                echo "::error::codex-review-check.sh config/arg error (rc=3) on PR #$PR"
                # Don't exit non-zero mid-loop — keep sweeping other
                # PRs on a multi-PR workflow_run trigger. But set
                # the sentinel so the job exits non-zero at the end.
                had_infra_error=1
                failing_prs="$failing_prs $PR"
                ;;
              *)
                echo "::error::codex-review-check.sh unexpected rc=$rc on PR #$PR (contract drift — failing job)"
                # Fail-closed: any rc outside 0/1/3 is contract drift.
                # Better to fail loudly than leave the label stuck
                # behind a silently-broken gate. CR Major on PR #202 r3.
                had_infra_error=1
                failing_prs="$failing_prs $PR"
                ;;
            esac
            echo "::endgroup::"
          done <<<"$PR_NUMBERS"
          # Surface the infra-error sentinel + per-PR list to the next
          # step (#324 round 2 codex P2) so the check-run can be posted
          # with the correct head SHA per PR. failing_prs is space-
          # separated, may have a leading space — `echo` collapses it.
          echo "HAD_INFRA_ERROR=$had_infra_error" >> "$GITHUB_ENV"
          # shellcheck disable=SC2086  # intentional word-splitting to trim
          echo "HAD_INFRA_ERROR_PRS=$(echo $failing_prs)" >> "$GITHUB_ENV"
          exit "$had_infra_error"

      - name: Surface infra failure as per-PR check-runs
        # Run even when the prior step failed — `if: always()` + the
        # HAD_INFRA_ERROR sentinel so we only post failed check-runs
        # when the prior step actually hit an infra error (not when
        # everything was clean or only gate-evaluation said "not yet
        # met").
        #
        # Per-PR check-runs (#324 round 2 codex P2): the prior version
        # used `head_sha: ${{ github.sha }}`, but on workflow_run /
        # pull_request_target / schedule, github.sha resolves to a
        # default-branch commit, not the affected PR's head, so the
        # annotation landed on the wrong commit and missed the target
        # PR's Checks tab. Posting one check-run per failing PR fixes
        # both the wrong-commit problem and the lost-visibility
        # problem, at the cost of one extra `gh pr view` per failure
        # (cheap, only on the error path).
        if: always() && env.HAD_INFRA_ERROR == '1'
        env:
          # check-run POST works with GITHUB_TOKEN + `checks: write`
          # (added above). No PAT needed for this annotation surface.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source scripts/lib/gh-retry-helpers.sh
          REPO='${{ github.repository }}'
          RUN_URL='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          # HAD_INFRA_ERROR_PRS is a space-separated list set by the
          # prior step at each had_infra_error=1 site. Empty list →
          # nothing to surface (defensive: should not happen given
          # HAD_INFRA_ERROR is set).
          if [ -z "${HAD_INFRA_ERROR_PRS:-}" ]; then
            echo "::warning::HAD_INFRA_ERROR=1 but HAD_INFRA_ERROR_PRS is empty — skipping check-run emission."
            exit 0
          fi
          for PR in $HAD_INFRA_ERROR_PRS; do
            echo "::group::Posting infra-failure check-run for PR #$PR"
            if ! HEAD_SHA=$(with_gh_retry gh pr view "$PR" --repo "$REPO" --json headRefOid --jq .headRefOid); then
              echo "::warning::Failed to resolve head SHA for PR #$PR — skipping check-run."
              echo "::endgroup::"
              continue
            fi
            if current_has_label=$(with_gh_retry gh pr view "$PR" --repo "$REPO" --json labels --jq 'any(.labels[]?; .name == "needs-external-review")'); then
              :
            else
              echo "::warning::Failed to re-read needs-external-review on PR #$PR before posting the infra-failure check-run."
              current_has_label=unknown
            fi
            if [ "$current_has_label" = "false" ]; then
              # Issue #499: the label removal can succeed while the
              # immediate verification read returns unknown. In that
              # case a later read proving the label is absent should
              # heal the synthetic check-run instead of leaving a
              # permanent failure on the PR's Checks tab.
              with_gh_retry gh api "repos/$REPO/check-runs" \
                -X POST \
                -f name='auto-clear-blocking-labels' \
                -f "head_sha=$HEAD_SHA" \
                -f status='completed' \
                -f conclusion='success' \
                -F "output[title]=Auto-clear confirmed needs-external-review absent" \
                -F "output[summary]=PR #$PR — a prior verification failed, but a later read confirmed the label is absent. See workflow run logs: $RUN_URL" \
                || echo "::warning::Failed to post healed check-run for PR #$PR (workflow log still confirms the label is absent)."
              echo "::endgroup::"
              continue
            fi
            with_gh_retry gh api "repos/$REPO/check-runs" \
              -X POST \
              -f name='auto-clear-blocking-labels' \
              -f "head_sha=$HEAD_SHA" \
              -f status='completed' \
              -f conclusion='failure' \
              -F "output[title]=Auto-clear hit an infrastructure error" \
              -F "output[summary]=PR #$PR — see workflow run logs: $RUN_URL" \
              || echo "::warning::Failed to post check-run for PR #$PR (annotation lost; workflow log still surfaces the failure)."
            echo "::endgroup::"
          done

  scheduled-sweep:
    name: Periodic sweep for stale needs-external-review labels
    # Catches the 👍-after-last-push case (#197). Only fires on
    # schedule; the event-driven evaluate-and-clear job above
    # handles the common path. Idempotent: running twice on the
    # same PR with no state change is a no-op (label-present check
    # + read-only gate evaluation).
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (for codex-review-check.sh)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # Schedule events have no PR context, so default GITHUB_REF
          # is the default branch already — pin explicitly for
          # consistency with the security stance of the event-driven
          # job above.
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Find PRs carrying needs-external-review
        id: find
        env:
          # Read-only list query. GITHUB_TOKEN is sufficient here —
          # the PAT-switch in the next step is what triggers downstream
          # workflows when the label is actually removed.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          source scripts/lib/gh-retry-helpers.sh
          # Read the per-repo cadence/enable knob from review-policy.yml.
          # Defaults: enabled=true. Operators can opt out by setting
          #   auto_clear_labels:
          #     scheduled_sweep_enabled: false
          # in their .github/review-policy.yml.
          CONFIG=".github/review-policy.yml"
          enabled=true
          if [ -f "$CONFIG" ]; then
            # CR Major on PR #213: strip trailing YAML comments
            # before comparing — `false  # opt out` was previously
            # being parsed as `false#optout`, leaving the sweep
            # enabled even when the operator explicitly disabled it.
            val=$(awk '
              /^auto_clear_labels:/ {in_block=1; next}
              in_block && /^[^[:space:]]/ {exit}
              in_block && /^[[:space:]]+scheduled_sweep_enabled:/ {
                sub(/#.*/, "")
                gsub(/.*: */, "")
                gsub(/[[:space:]]/, "")
                print
                exit
              }
            ' "$CONFIG")
            [ "$val" = "false" ] && enabled=false
          fi
          if [ "$enabled" = "false" ]; then
            echo "Scheduled sweep disabled for $REPO via review-policy.yml; skipping."
            echo "prs=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # List open PRs carrying the label. CR Major on PR #213:
          # `--limit 500` overrides gh's default of 30 so the sweep
          # processes ALL matching PRs in repos with high open-PR
          # counts. 500 is comfortably above any realistic limit for
          # a single repo's needs-external-review queue (would imply
          # ~500 PRs awaiting review — itself an alarm).
          # CR Major on PR #213 r2: capture gh output + exit status
          # separately. The prior `mapfile -t prs < <(gh ...)` form
          # swallowed gh's exit code via process substitution, so a
          # gh failure (auth, rate limit, network) silently became
          # "0 PRs found" and the sweep no-op'd instead of failing
          # loudly.
          if ! prs_raw=$(with_gh_retry gh pr list --repo "$REPO" --state open \
            --label needs-external-review --limit 500 \
            --json number --jq '.[].number'); then
            echo "::error::Failed to list open PRs with needs-external-review on $REPO"
            exit 1
          fi
          prs=()
          if [ -n "$prs_raw" ]; then
            mapfile -t prs <<<"$prs_raw"
          fi
          echo "Found ${#prs[@]} PR(s) with needs-external-review on $REPO"
          if [ "${#prs[@]}" -eq 0 ]; then
            echo "prs=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo 'prs<<EOF'
            printf '%s\n' "${prs[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Re-evaluate gate per PR
        if: steps.find.outputs.prs != ''
        env:
          # PAT-driven label removal (#315/#324). See
          # evaluate-and-clear job above for the rationale; same
          # secret, same recursion-prevention bypass. Without the
          # PAT, the scheduled sweep would remove the label but
          # downstream workflows (pr-review-policy.yml Label Gate)
          # would not re-fire — so mergeStateStatus would stay
          # BLOCKED until the next push or manual nudge, defeating
          # the sweep's purpose.
          GH_TOKEN: ${{ secrets.REVIEWER_ASSIGNMENT_TOKEN }}
          PRS: ${{ steps.find.outputs.prs }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          source scripts/lib/gh-retry-helpers.sh
          had_infra_error=0
          failing_prs=""
          while IFS= read -r PR; do
            [ -z "$PR" ] && continue
            echo "::group::Sweep PR #$PR"
            set +e
            scripts/codex-review-check.sh "$PR"
            rc=$?
            set -e
            case "$rc" in
              0)
                echo "Gate passes — removing needs-external-review label."
                # Single (non-retried) removal + retried verify (#465) — see
                # the evaluate-and-clear job above for the full rationale.
                gh pr edit "$PR" --repo "$REPO" --remove-label needs-external-review 2>/dev/null || true
                still_present=$(with_gh_retry gh pr view "$PR" --repo "$REPO" --json labels --jq 'any(.labels[]?; .name == "needs-external-review")' || echo "unknown")
                if [ "$still_present" = "false" ]; then
                  comment_body='**Automated label removal (scheduled sweep).** `scripts/codex-review-check.sh` cleared the merge gate on this HEAD between event triggers (typical: Codex 👍 after the last push, with no synchronize / review / workflow_run event to fire the event-driven path). Removed `needs-external-review`. See [.github/workflows/auto-clear-blocking-labels.yml](.github/workflows/auto-clear-blocking-labels.yml) (#191/#197) for the sweep doctrine.'
                  with_gh_retry gh pr comment "$PR" --repo "$REPO" --body "$comment_body" \
                    || echo "::warning::Failed to post attribution comment for PR #$PR"
                else
                  # Removal did not take (label still present or verify read
                  # failed) — infra error, not warning-only. The sweep must
                  # not report success when the label is still stuck
                  # (CodeRabbit Major, #271; verify-end-state per #465).
                  echo "::error::Failed to remove needs-external-review on PR #$PR — label still stuck (state: $still_present)."
                  had_infra_error=1
                  failing_prs="$failing_prs $PR"
                fi
                ;;
              1) echo "Gate not yet met — leaving label in place." ;;
              3) echo "::error::codex-review-check.sh rc=3 on PR #$PR"; had_infra_error=1; failing_prs="$failing_prs $PR" ;;
              *) echo "::error::unexpected rc=$rc on PR #$PR"; had_infra_error=1; failing_prs="$failing_prs $PR" ;;
            esac
            echo "::endgroup::"
          done <<<"$PRS"
          # Surface the infra-error sentinel + per-PR list to the next
          # step (#324 round 2 codex P2). See evaluate-and-clear job
          # for the rationale (correct head SHA per failing PR).
          echo "HAD_INFRA_ERROR=$had_infra_error" >> "$GITHUB_ENV"
          # shellcheck disable=SC2086  # intentional word-splitting to trim
          echo "HAD_INFRA_ERROR_PRS=$(echo $failing_prs)" >> "$GITHUB_ENV"
          exit "$had_infra_error"

      - name: Surface infra failure as per-PR check-runs
        # Mirrors evaluate-and-clear's surfacing step. See that step's
        # comments for the per-PR check-run rationale (#324 round 2 P2).
        if: always() && env.HAD_INFRA_ERROR == '1'
        env:
          # check-run POST works with GITHUB_TOKEN + `checks: write`.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source scripts/lib/gh-retry-helpers.sh
          REPO='${{ github.repository }}'
          RUN_URL='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          if [ -z "${HAD_INFRA_ERROR_PRS:-}" ]; then
            echo "::warning::HAD_INFRA_ERROR=1 but HAD_INFRA_ERROR_PRS is empty — skipping check-run emission."
            exit 0
          fi
          for PR in $HAD_INFRA_ERROR_PRS; do
            echo "::group::Posting infra-failure check-run for PR #$PR (sweep)"
            if ! HEAD_SHA=$(with_gh_retry gh pr view "$PR" --repo "$REPO" --json headRefOid --jq .headRefOid); then
              echo "::warning::Failed to resolve head SHA for PR #$PR — skipping check-run."
              echo "::endgroup::"
              continue
            fi
            if current_has_label=$(with_gh_retry gh pr view "$PR" --repo "$REPO" --json labels --jq 'any(.labels[]?; .name == "needs-external-review")'); then
              :
            else
              echo "::warning::Failed to re-read needs-external-review on PR #$PR before posting the infra-failure check-run (sweep)."
              current_has_label=unknown
            fi
            if [ "$current_has_label" = "false" ]; then
              # Issue #499: the label removal can succeed while the
              # immediate verification read returns unknown. In that
              # case a later read proving the label is absent should
              # heal the synthetic check-run instead of leaving a
              # permanent failure on the PR's Checks tab.
              with_gh_retry gh api "repos/$REPO/check-runs" \
                -X POST \
                -f name='auto-clear-blocking-labels' \
                -f "head_sha=$HEAD_SHA" \
                -f status='completed' \
                -f conclusion='success' \
                -F "output[title]=Auto-clear confirmed needs-external-review absent (scheduled sweep)" \
                -F "output[summary]=PR #$PR — a prior sweep verification failed, but a later read confirmed the label is absent. See workflow run logs: $RUN_URL" \
                || echo "::warning::Failed to post healed sweep check-run for PR #$PR (workflow log still confirms the label is absent)."
              echo "::endgroup::"
              continue
            fi
            with_gh_retry gh api "repos/$REPO/check-runs" \
              -X POST \
              -f name='auto-clear-blocking-labels' \
              -f "head_sha=$HEAD_SHA" \
              -f status='completed' \
              -f conclusion='failure' \
              -F "output[title]=Auto-clear hit an infrastructure error (scheduled sweep)" \
              -F "output[summary]=PR #$PR — see workflow run logs: $RUN_URL" \
              || echo "::warning::Failed to post check-run for PR #$PR (annotation lost; workflow log still surfaces the failure)."
            echo "::endgroup::"
          done
