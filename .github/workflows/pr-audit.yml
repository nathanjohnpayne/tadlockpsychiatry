name: Weekly PR Audit

# Cron-driven retroactive check that the previous week's merged PRs
# satisfied the review policy. Six checks per merged PR:
#
#   1. Self-Review section present in PR body (Dependabot exempted)
#   2. external-review-labeled PRs have either an APPROVED CLI
#      reviewer review OR a review from the Codex GitHub app bot;
#      Dependabot PRs require an APPROVED CLI reviewer review
#   3. No bot self-approval (reviewer identity approving its own PR)
#   4. needs-human-review label not still present at merge time
#   5. policy-violation label not still present at merge time
#   6. human-hold label not still present at merge time
#
# Violations are aggregated into a single audit issue per run.
# See REVIEW_POLICY.md, .github/review-policy.yml, and #36 for
# the canonical policy and the most recent semantics changes.

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  audit:
    name: Audit Merged PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install js-yaml
        run: npm install --no-save --ignore-scripts --legacy-peer-deps js-yaml

      - name: Audit merged PRs for review policy compliance
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.REVIEWER_ASSIGNMENT_TOKEN }}
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');

            // Read reviewer accounts and the Codex bot login from
            // review-policy.yml. The Codex bot login is read from
            // codex.bot_login (added in #31) so that the OpenAI
            // Codex GitHub app's reviews count as satisfying the
            // external-review requirement, in addition to the
            // nathanpayne-* CLI reviewer identities. See #26 for
            // the bot identity decision and #36 for the audit-side
            // allow-list change.
            let reviewerAccounts;
            let authorIdentity;
            let codexBotLogin;
            let reactionFreshnessWindowSeconds;
            let codexEnabled;
            try {
              const config = yaml.load(fs.readFileSync('.github/review-policy.yml', 'utf8'));
              reviewerAccounts = config.available_reviewers || [];
              authorIdentity = config.author_identity || 'nathanjohnpayne';
              codexBotLogin = (config.codex && config.codex.bot_login) || 'chatgpt-codex-connector[bot]';
              reactionFreshnessWindowSeconds =
                (config.codex && config.codex.reaction_freshness_window_seconds) || 1800;
              // Default true (matches codex-review-check.sh CODEX_ENABLED:-true).
              codexEnabled = !(config.codex && config.codex.enabled === false);
            } catch (e) {
              console.log('WARNING: Could not read review-policy.yml, using defaults');
              reviewerAccounts = ['nathanpayne-claude', 'nathanpayne-codex', 'nathanpayne-cursor'];
              authorIdentity = 'nathanjohnpayne';
              codexBotLogin = 'chatgpt-codex-connector[bot]';
              reactionFreshnessWindowSeconds = 1800;
              codexEnabled = true;
            }

            // The Codex bot's review-state semantics differ from
            // CLI reviewer identities, so the external-review check
            // below treats them on separate code paths rather than
            // unioning them into a single allow-list. See the
            // Check 2 block for the full rationale; the short
            // version is that CLI identities still require
            // state === 'APPROVED' but the Codex bot can clear
            // with a COMMENTED review on the current HEAD that
            // carries no unaddressed P0/P1 inline findings, because
            // the GitHub app never emits APPROVED (see #29 for
            // observational evidence).
            //
            // Codex clearance is state-aware (#249): a Codex review
            // that is present but flags P0/P1 findings does NOT
            // clear the audit gate. The clearance definition is the
            // same one `scripts/codex-review-check.sh` enforces at
            // merge time — a COMMENTED review from the Codex bot on
            // the current HEAD SHA with zero unresolved P0/P1 inline
            // findings (P0/P1 detected via the `![P0 Badge]` /
            // `![P1 Badge]` markdown markers Codex inlines into its
            // findings). When the merge-gate helper for P0/P1
            // counting from #235 lands, refactor the inline JS below
            // to shell out to that shared helper so the two gates
            // cannot drift. See #249.

            const since = new Date();
            since.setDate(since.getDate() - 7);
            const sinceISO = since.toISOString();
            const today = new Date().toISOString().split('T')[0];

            // Get merged PRs from the past 7 days
            const prs = await github.paginate(
              github.rest.pulls.list,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed',
                sort: 'updated',
                direction: 'desc',
                per_page: 100,
              }
            );

            const mergedPRs = prs.filter(
              pr => pr.merged_at && new Date(pr.merged_at) >= since
            );

            const violations = [];

            async function labelWasPresentAtMerge(pr, labelName) {
              const events = await github.paginate(
                github.rest.issues.listEvents,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  per_page: 100,
                }
              );
              const mergedAt = new Date(pr.merged_at).getTime();
              let present = false;
              for (const event of events.sort(
                (a, b) => new Date(a.created_at) - new Date(b.created_at)
              )) {
                if (new Date(event.created_at).getTime() > mergedAt) {
                  continue;
                }
                if (!event.label || event.label.name !== labelName) {
                  continue;
                }
                if (event.event === 'labeled') {
                  present = true;
                } else if (event.event === 'unlabeled') {
                  present = false;
                }
              }
              return present;
            }

            for (const pr of mergedPRs) {
              const prViolations = [];
              const isDependabot = pr.user.login === 'dependabot[bot]';

              // Fetch all reviews for this PR once, up front. Both
              // Check 2 (external-review approval) and Check 3 (bot
              // self-approval) consume them, and an earlier version
              // of this script fetched twice. CodeRabbit caught the
              // duplicate on PR #68.
              //
              // Paginate via `github.paginate` (PR #255 round 2 Codex
              // P2): the unpaginated `listReviews` call returns at
              // most 30 items in chronological order, so on a PR with
              // a long review history the latest Codex review on
              // `pr.head.sha` can sit on a later page and never reach
              // the HEAD-scoped filter below. The result was a
              // false-positive policy violation even when Codex had
              // genuinely cleared on HEAD. `per_page: 100 +
              // page traversal` is the standard GitHub-API fix and
              // matches the patterns already used at the
              // `pulls.list` and `pulls.listReviewComments` call
              // sites in this file.
              const reviews = await github.paginate(
                github.rest.pulls.listReviews,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  per_page: 100,
                }
              );

              // Check 1: Missing Self-Review section
              //
              // Skip for Dependabot PRs. Dependabot doesn't author a
              // body with the Self-Review template, and the
              // pre-merge gate in pr-review-policy.yml already
              // skips Dependabot via the pull request author login
              // (not github.actor, which can drift on reruns). The
              // audit was previously flagging every Dependabot PR as
              // a false positive — see #20.
              if (!isDependabot) {
                if (!pr.body || !pr.body.match(/^## Self-Review/m)) {
                  prViolations.push('Missing `## Self-Review` section');
                }
              }

              // Check 2: Had needs-external-review label — verify approval
              //
              // Also runs unconditionally for Dependabot PRs (see #20):
              // even patch/minor bumps must have ONE reviewer-identity
              // approval before merge. The existing
              // .github/workflows/dependabot-auto-merge.yml posts
              // `gh pr review --approve` via REVIEWER_ASSIGNMENT_TOKEN
              // before enabling auto-merge, so well-behaved auto-merge
              // PRs satisfy this naturally. Only Dependabot PRs that
              // were merged manually WITHOUT any reviewer-identity
              // approval will be flagged — which is the real gap.
              const hadExternalLabel = pr.labels.some(
                l => l.name === 'needs-external-review'
              );
              const dependabotNeedsApproval = isDependabot;

              // Exemption (#229): PRs opened by `scripts/sync-to-downstream.sh`
              // propagate already-reviewed mergepath commits to downstream
              // consumers. Re-reviewing a propagation PR on each consumer
              // is redundant (the upstream commit was reviewed in mergepath
              // itself), so the audit's external-review violation check is
              // skipped for these PRs. Dependabot's separate rule
              // (cliApprovedReviews) is unaffected.
              //
              // Four guards, all required, defending against spoofing
              // (CodeRabbit ⚠️ Major on PR #230 round 1 — naming alone is
              // not a trusted-provenance signal):
              //
              //   1. PR author == author_identity from review-policy.yml
              //      (typically `nathanjohnpayne`). The propagation script
              //      runs under that identity per CLAUDE.md's active-account
              //      convention; a PR from any other login isn't from the
              //      sync flow.
              //   2. Head ref comes from the same repo (not a fork). Forks
              //      can't impersonate the propagation flow because the
              //      sync script pushes directly to the consumer repo's
              //      own `mergepath-sync/*` namespace.
              //   3. Head branch namespace `mergepath-sync/*` — owned by
              //      the sync script's branch-naming convention
              //      (`mergepath-sync/<short-sha>`) and never used for
              //      hand-authored work.
              //   4. PR title contains `mergepath@[0-9a-f]{7,40}` — the
              //      canonical title marker the sync script emits,
              //      identifying the upstream commit. Per-commit sync PRs
              //      use `(mergepath@<sha>)`; `--sync-all` PRs use
              //      `to mergepath@<sha>`.
              //
              // Hand-creating all four signals at once is possible but is
              // an explicit, traceable action that would surface during
              // self-review.
              const isTrustedSyncAuthor =
                pr.user && pr.user.login === authorIdentity;
              const isSameRepoHead =
                pr.head && pr.head.repo &&
                pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;
              const hasSyncBranchName =
                pr.head && pr.head.ref &&
                pr.head.ref.startsWith('mergepath-sync/');
              const hasMergepathMarker =
                /\bmergepath@[0-9a-f]{7,40}\b/.test(pr.title || '');
              const isMergepathSyncPR =
                isTrustedSyncAuthor &&
                isSameRepoHead &&
                hasSyncBranchName &&
                hasMergepathMarker;

              if (hadExternalLabel || dependabotNeedsApproval) {
                // For the external-review path we accept either:
                //   - an APPROVED review from a CLI reviewer identity
                //     (nathanpayne-claude / nathanpayne-codex / etc.), OR
                //   - a CLEARED review from the Codex GitHub app bot,
                //     where "cleared" is the same two-condition
                //     definition the merge gate uses (#249):
                //       1. a COMMENTED review from the Codex bot on
                //          the PR's HEAD SHA, AND
                //       2. zero unresolved P0/P1 inline findings on
                //          that review (P0/P1 markers are the
                //          `![P0 Badge]` / `![P1 Badge]` images Codex
                //          embeds in its inline finding bodies).
                //
                // The state-agnostic exception is intentionally
                // SCOPED to the Codex bot only. CLI reviewer
                // identities still require state === 'APPROVED'
                // because a non-opinionated COMMENTED review from
                // a CLI reviewer is not a clearance signal under
                // policy. nathanpayne-codex caught this on PR #68
                // round 1 — earlier draft accepted any review from
                // any external approver, which would have let a
                // Phase 4b fallback PR with only a COMMENTED CLI
                // review pass the audit.
                //
                // Codex P0/P1 gating (#249): the prior version used
                // `codexBotReviews.length === 0` as the block
                // condition — so any Codex review (even one actively
                // raising P0/P1 findings) satisfied the gate. The
                // tightened gate mirrors `scripts/codex-review-check.sh`'s
                // gate (c) two-condition shape on the PR's HEAD SHA.
                // TODO(#235): once the merge-gate ships a shared
                // `codex-p1-gate` helper (or equivalent extraction
                // from codex-review-check.sh), refactor the inline
                // computation below to call it so the audit gate and
                // merge gate cannot drift.
                const cliApprovedReviews = reviews.filter(
                  r => r.state === 'APPROVED' &&
                       reviewerAccounts.includes(r.user.login)
                );

                const headSha = pr.head && pr.head.sha;

                // Codex reviews on the PR's HEAD SHA. The merge-time
                // gate uses commit_id == HEAD_SHA to scope findings
                // to the latest review round; the audit applies the
                // same scope. If the audit's notion of HEAD ever
                // drifts (e.g. force-pushes post-merge), tighten
                // here — but post-merge HEAD is immutable in
                // practice.
                const codexReviewsOnHead = reviews.filter(
                  r => r.user.login === codexBotLogin &&
                       headSha &&
                       r.commit_id === headSha
                );

                const codexCommentedOnHead = codexReviewsOnHead.filter(
                  r => r.state === 'COMMENTED'
                );

                // Codex clearance mirrors scripts/codex-review-check.sh
                // gate (c): a PR clears when the LATEST qualifying Codex
                // signal on the merge HEAD is either
                //   - a COMMENTED review with no UNRESOLVED P0/P1 inline
                //     findings (#249 + resolution-aware, #449), OR
                //   - a 👍/+1 reaction from the Codex bot inside the
                //     merge-time freshness window (#450).
                // Latest-signal-wins decides between them, identically to
                // the merge gate, so a PR legitimately merged on either
                // form is not retroactively flagged. Resolves TODO(#235).
                //
                // Inline P0/P1 findings live on /pulls/{pr}/comments,
                // keyed to a review via pull_request_review_id; resolution
                // state lives on the GraphQL reviewThreads view, joined by
                // comment databaseId (same join as scripts/codex-p1-gate.sh).
                let inlineComments = [];
                try {
                  inlineComments = await github.paginate(
                    github.rest.pulls.listReviewComments,
                    {
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: pr.number,
                      per_page: 100,
                    }
                  );
                } catch (e) {
                  console.log(
                    `WARNING: could not fetch inline comments for PR #${pr.number}; ` +
                    `treating Codex clearance as NOT met for safety. Error: ${e.message}`
                  );
                  inlineComments = null;
                }

                // Comment-databaseId → { resolved, threadLatestAt } map,
                // paginated over all review threads. null = lookup failed →
                // fail CLOSED (#449): every P0/P1 finding is then treated as
                // unresolved, so the review path cannot clear on a lookup
                // failure. Inner comments(first:100) matches
                // scripts/codex-p1-gate.sh (a single P0/P1 thread with
                // >100 replies is not a real shape).
                //
                // threadLatestAt is the newest comment time in the thread.
                // GitHub exposes NO thread resolvedAt and NO resolve
                // timeline event (verified by schema introspection), so this
                // retrospective audit cannot read WHEN a thread was resolved.
                // A thread resolved AFTER merge would otherwise wrongly clear
                // (Codex P1 on #460). The clearance algorithm below bounds
                // resolution by merge time using the newest comment as a
                // proxy: a resolved thread is honored only when it shows no
                // comment activity after merged_at (and merged_at is known).
                // Residual: a silent UI-button resolve with no following
                // comment can't be dated — the codex-p1-gate REQUIRED check
                // is the at-merge primary enforcement, this audit the
                // retrospective backstop.
                let resolutionByCommentId = {};
                try {
                  let cursor = null;
                  for (;;) {
                    const tresp = await github.graphql(
                      `query($owner:String!,$name:String!,$pr:Int!,$cursor:String){
                         repository(owner:$owner,name:$name){
                           pullRequest(number:$pr){
                             reviewThreads(first:100, after:$cursor){
                               pageInfo { hasNextPage endCursor }
                               nodes { isResolved comments(first:100){ nodes { databaseId createdAt } } }
                             }
                           }
                         }
                       }`,
                      {
                        owner: context.repo.owner,
                        name: context.repo.repo,
                        pr: pr.number,
                        cursor,
                      }
                    );
                    const rt = tresp.repository.pullRequest.reviewThreads;
                    for (const t of rt.nodes) {
                      let threadLatestAt = '';
                      for (const c of t.comments.nodes) {
                        if (c.createdAt && c.createdAt > threadLatestAt) {
                          threadLatestAt = c.createdAt;
                        }
                      }
                      for (const c of t.comments.nodes) {
                        resolutionByCommentId[String(c.databaseId)] = {
                          resolved: t.isResolved,
                          threadLatestAt,
                        };
                      }
                    }
                    if (!rt.pageInfo.hasNextPage) break;
                    cursor = rt.pageInfo.endCursor;
                  }
                } catch (e) {
                  console.log(
                    `WARNING: reviewThreads resolution lookup failed for PR #${pr.number}; ` +
                    `failing closed (P0/P1 findings treated as unresolved). Error: ${e.message}`
                  );
                  resolutionByCommentId = null;
                }

                // Codex bot 👍/+1 reactions on the PR issue. The merge
                // gate anchors freshness to max(HEAD push, NOW - window);
                // the WEEKLY audit instead anchors to MERGE time, because
                // a valid merge-time +1 is week-old by audit time and a
                // NOW - window floor would wrongly reject it (#450). The
                // window is [HEAD committer date, merged_at]: on/after the
                // HEAD freshness floor and not a post-merge reaction.
                let reactions = [];
                try {
                  reactions = await github.paginate(
                    github.rest.reactions.listForIssue,
                    {
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: pr.number,
                      per_page: 100,
                    }
                  );
                } catch (e) {
                  console.log(
                    `WARNING: could not fetch reactions for PR #${pr.number}; ` +
                    `reaction-clearance path disabled. Error: ${e.message}`
                  );
                  reactions = [];
                }

                // HEAD committer date — the BASE reaction-window lower
                // bound. Unavailable → reaction path stays off (fail closed
                // for that path; the review path is unaffected).
                let headCommitterDate = '';
                try {
                  const commitResp = await github.rest.repos.getCommit({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: headSha,
                  });
                  headCommitterDate =
                    (commitResp.data.commit.committer &&
                     commitResp.data.commit.committer.date) || '';
                } catch (e) {
                  console.log(
                    `WARNING: could not fetch HEAD commit for PR #${pr.number}; ` +
                    `reaction-clearance lower bound unavailable. Error: ${e.message}`
                  );
                  headCommitterDate = '';
                }

                // Raise the lower bound to the latest force-push time when
                // it is newer than the committer date — mirrors
                // codex-review-check.sh's HEAD_PUSHED_AT = max(committer
                // date, head_ref_force_pushed). A PR force-pushed to an
                // old/reused commit carries an OLD committer date, so
                // without this a stale +1 from before the force-push could
                // satisfy the window and falsely clear the audit for
                // exactly the force-push bypass it exists to catch (Codex
                // P2 on PR #460).
                //
                // Only force-pushes at or before merged_at are part of
                // merge-time state. A branch force-pushed AFTER merge would
                // otherwise raise reactionLowerBound past merged_at, emptying
                // the [lowerBound, merged_at] window and falsely flagging a PR
                // that legitimately cleared via a pre-merge 👍 (Codex P2 on
                // PR #460 round 2). Mirrors labelWasPresentAtMerge /
                // resolvedAtMerge merge-time reconstruction.
                const mergedAt = pr.merged_at || '';
                let lastForcePushAt = '';
                try {
                  const timeline = await github.paginate(
                    github.rest.issues.listEventsForTimeline,
                    {
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: pr.number,
                      per_page: 100,
                    }
                  );
                  for (const ev of timeline) {
                    if (ev.event === 'head_ref_force_pushed' &&
                        ev.created_at &&
                        (!mergedAt || ev.created_at <= mergedAt) &&
                        ev.created_at > lastForcePushAt) {
                      lastForcePushAt = ev.created_at;
                    }
                  }
                } catch (e) {
                  console.log(
                    `WARNING: could not fetch timeline for PR #${pr.number}; ` +
                    `force-push reaction anchor unavailable. Error: ${e.message}`
                  );
                  lastForcePushAt = '';
                }

                // Merge-time freshness floor for +1 reactions (#460 Codex
                // P2): the merge gate's reaction lower bound is
                // max(HEAD_PUSHED_AT, NOW - reaction_freshness_window). An
                // ordinary push to a commit with an OLD committer date leaves
                // the committer/force-push anchor early, so a stale
                // prior-HEAD 👍 the merge gate would reject (older than its
                // NOW-window floor) could otherwise clear this retrospective
                // audit. Anchor the equivalent floor to MERGE time:
                // merged_at - window. Strip the .000 ms so it compares
                // lexicographically against the ms-less ISO timestamps.
                let mergedAtFloor = '';
                if (mergedAt) {
                  const t = Date.parse(mergedAt);
                  if (!Number.isNaN(t)) {
                    mergedAtFloor = new Date(t - reactionFreshnessWindowSeconds * 1000)
                      .toISOString().replace(/\.\d{3}Z$/, 'Z');
                  }
                }

                // Reaction-window lower bound = max(committer date, last
                // force-push, merged_at - window), lexicographic on ISO-8601
                // — the merge gate's max(HEAD_PUSHED_AT, NOW - window) adapted
                // to merge time. Empty committer date keeps the reaction path
                // off (fail closed); the force-push and merge-time-floor only
                // RAISE an existing base, never substitute for it.
                let reactionLowerBound = '';
                if (headCommitterDate) {
                  reactionLowerBound = headCommitterDate;
                  if (lastForcePushAt > reactionLowerBound) reactionLowerBound = lastForcePushAt;
                  if (mergedAtFloor > reactionLowerBound) reactionLowerBound = mergedAtFloor;
                }

                // ── Clearance algorithm (#249/#449/#450) ──────────────
                // KEEP IN SYNC with the mirrored runner in
                // scripts/ci/check_pr_audit_codex_clearance.
                //
                // Gate on codexEnabled (#460 Codex P2): when codex.enabled is
                // false, scripts/codex-review-check.sh ignores Codex bot
                // reviews/reactions entirely (gate (c) clears only via a Phase
                // 4b substitute APPROVED). The audit must match — otherwise a
                // stray 👍 from a still-installed App on a codex-disabled repo
                // would mark a merge compliant the merge gate never cleared.
                // codexCleared stays false, so the audit falls through to the
                // CLI-APPROVED requirement below.
                let codexCleared = false;
                if (codexEnabled && inlineComments !== null) {
                  // Latest Codex COMMENTED review on HEAD (max submitted_at).
                  let latestCodexReview = null;
                  if (codexCommentedOnHead.length > 0) {
                    latestCodexReview = codexCommentedOnHead.reduce(
                      (latest, r) => {
                        if (!latest) return r;
                        return (r.submitted_at > latest.submitted_at) ? r : latest;
                      },
                      null
                    );
                  }
                  const latestReviewTime =
                    latestCodexReview ? (latestCodexReview.submitted_at || '') : '';

                  // Unresolved P0/P1 findings on the latest review. P0/P1
                  // markers are the `![P0 Badge]` / `![P1 Badge]` images
                  // Codex embeds; scope to the bot author so an author
                  // quote-reply doesn't read as a finding (#249). A
                  // finding counts as unresolved unless its thread is
                  // RESOLVED *and that resolution is bounded by merge time*
                  // (#449 + #460).
                  const p01Regex = /!\[P[01] Badge\]/;
                  let reviewHasUnresolvedP01 = false;
                  if (latestCodexReview) {
                    const p01 = inlineComments.filter(
                      c => c.user && c.user.login === codexBotLogin &&
                           c.pull_request_review_id === latestCodexReview.id &&
                           p01Regex.test(c.body || '')
                    );
                    if (resolutionByCommentId === null) {
                      reviewHasUnresolvedP01 = p01.length > 0; // fail closed
                    } else {
                      // A P0/P1 finding counts as resolved ONLY when its
                      // thread is resolved AND that resolution is bounded by
                      // merge: merged_at is known and the thread shows no
                      // comment activity after it. GitHub exposes no
                      // resolvedAt, so post-merge comment activity is the
                      // conservative proxy — a thread resolved after merge
                      // must not retroactively clear the audit (Codex P1 on
                      // #460). Fail closed on unknown merged_at.
                      const resolvedAtMerge = (cid) => {
                        const e = resolutionByCommentId[String(cid)];
                        if (!e || e.resolved !== true) return false;
                        if (!mergedAt) return false;
                        if (e.threadLatestAt && e.threadLatestAt > mergedAt) return false;
                        return true;
                      };
                      reviewHasUnresolvedP01 = p01.some(c => !resolvedAtMerge(c.id));
                    }
                  }

                  // Same-agent context (Codex P2 on #460 r3): a Codex +1
                  // substitutes for gate (b)'s reviewer approval ONLY when the
                  // PR's Authoring-Agent resolves to an available reviewer
                  // identity (e.g. `Authoring-Agent: claude` → nathanpayne-
                  // claude). codex-review-check.sh gates branch 2 (#170) on
                  // this; the audit must too, or a cross-agent / missing-
                  // Authoring-Agent PR merged with only a 👍 (which the merge
                  // gate rejects) would pass this audit. Mirrors the shell's
                  // AUTHORING_AGENT → SAME_AGENT_REVIEWER suffix match.
                  let sameAgentContext = false;
                  const agentMatch = (pr.body || '').match(
                    /^Authoring-Agent:[ \t]*([A-Za-z0-9_-]+)/im
                  );
                  if (agentMatch) {
                    const authoringAgent = agentMatch[1].toLowerCase();
                    sameAgentContext = reviewerAccounts.some(
                      r => String(r).toLowerCase().endsWith('-' + authoringAgent)
                    );
                  }

                  // Latest qualifying Codex +1 reaction in the merge-time
                  // window [reactionLowerBound, merged_at]. Empty
                  // latestReactionTime sorts below any ISO timestamp, so the
                  // first qualifier always sets it. Gated on sameAgentContext:
                  // a +1 from a non-same-agent PR does not clear gate (b).
                  let latestReactionTime = '';
                  if (sameAgentContext) {
                    for (const x of reactions) {
                      if (x.user && x.user.login === codexBotLogin &&
                          x.content === '+1' &&
                          reactionLowerBound && x.created_at >= reactionLowerBound &&
                          mergedAt && x.created_at <= mergedAt &&
                          x.created_at > latestReactionTime) {
                        latestReactionTime = x.created_at;
                      }
                    }
                  }

                  // Latest-signal-wins — mirrors codex-review-check.sh:
                  // a newer +1 clears an older review-with-findings; a
                  // newer review-with-findings blocks an older +1.
                  if (latestReactionTime && latestReviewTime) {
                    codexCleared = (latestReactionTime > latestReviewTime)
                      ? true
                      : !reviewHasUnresolvedP01;
                  } else if (latestReactionTime) {
                    codexCleared = true;
                  } else if (latestReviewTime) {
                    codexCleared = !reviewHasUnresolvedP01;
                  }
                }

                // ─────────────────────────────────────────────────
                // Dual-violation note (#287):
                //
                // The two `prViolations.push(...)` blocks below can
                // BOTH fire for a single PR — specifically, a
                // Dependabot PR that also carries the
                // `needs-external-review` label and merged with zero
                // reviewer-identity approvals. In that case the audit
                // emits both:
                //
                //   1. "External-review PR merged with no APPROVED
                //      review …" (from the hadExternalLabel branch)
                //   2. "Dependabot PR merged with no reviewer identity
                //      approval …" (from the dependabotNeedsApproval
                //      branch)
                //
                // This is INTENTIONAL, not an over-emit bug. The two
                // policy conditions are independent: one comes from
                // the external-review label being present at merge,
                // the other from Dependabot's narrower clearance rule
                // (Codex doesn't count for Dependabot — only a CLI
                // reviewer-identity APPROVED review does). When both
                // are simultaneously true, the audit correctly
                // surfaces both — collapsing them into a single line
                // would hide which gate the merge bypassed.
                // ─────────────────────────────────────────────────
                if (hadExternalLabel &&
                    cliApprovedReviews.length === 0 &&
                    !codexCleared &&
                    !isMergepathSyncPR) {
                  // Distinguish the two failure modes so the audit
                  // issue points at the right diagnosis: no Codex
                  // review at all vs. a Codex review with
                  // unresolved P0/P1 findings.
                  if (codexReviewsOnHead.length === 0) {
                    prViolations.push(
                      'External-review PR merged with no APPROVED review from a CLI reviewer identity and no Codex bot review on the merge HEAD'
                    );
                  } else {
                    prViolations.push(
                      'External-review PR merged with a Codex bot review on HEAD that did not clear (no COMMENTED state on HEAD, or unresolved P0/P1 inline findings); see #249'
                    );
                  }
                }

                // Dependabot PRs use a strictly narrower rule: only
                // an APPROVED review from a CLI reviewer identity
                // counts. Codex doesn't review Dependabot PRs in
                // the Phase 4a flow, so this is just defensive
                // against future weirdness — and reuses the
                // cliApprovedReviews array computed above.
                //
                // See the dual-violation note above: a Dependabot PR
                // also carrying `needs-external-review` will trip
                // both pushes on the same iteration. By design — the
                // two pushes report independent policy conditions.
                if (dependabotNeedsApproval && cliApprovedReviews.length === 0) {
                  prViolations.push(
                    'Dependabot PR merged with no reviewer identity approval (auto-merge approval missing or removed)'
                  );
                }
              }

              // Check 3: Self-approval from bot accounts
              // Under the shared identity model, all PRs are authored by
              // authorIdentity (nathanjohnpayne). The human IS that identity,
              // so nathanjohnpayne approving is legitimate (human tiebreaker).
              // Only flag if a reviewer bot account approved its own PR.
              // Reuses the `reviews` array fetched at the top of this
              // PR's iteration.
              const botSelfApproval = reviews.some(
                r => r.user.login === pr.user.login &&
                     r.state === 'APPROVED' &&
                     reviewerAccounts.includes(r.user.login)
              );

              if (botSelfApproval) {
                prViolations.push('Bot self-approval detected (reviewer account approved its own PR)');
              }

              // Check 4: Had needs-human-review label — verify it was removed before merge.
              // Under the shared identity model, nathanjohnpayne is the PR author
              // and cannot self-approve via the GitHub review API. The human
              // resolves escalation by removing the label (which unblocks the
              // label-gate check). If the label is still present at merge time,
              // it means the label gate was bypassed.
              const hadHumanLabel = await labelWasPresentAtMerge(
                pr,
                'needs-human-review'
              );

              if (hadHumanLabel) {
                prViolations.push(
                  'Merged with `needs-human-review` label still present — human resolution was bypassed'
                );
              }

              // Check 5: Had policy-violation label — should not have been merged
              const hadPolicyViolation = await labelWasPresentAtMerge(
                pr,
                'policy-violation'
              );

              if (hadPolicyViolation) {
                prViolations.push(
                  'Merged with `policy-violation` label still present'
                );
              }

              // Check 6: Had human-hold label — should not have been merged.
              const hadHumanHold = await labelWasPresentAtMerge(
                pr,
                'human-hold'
              );

              if (hadHumanHold) {
                prViolations.push(
                  'Merged with `human-hold` label still present — human hard hold was bypassed'
                );
              }

              if (prViolations.length > 0) {
                violations.push({
                  number: pr.number,
                  title: pr.title,
                  author: pr.user.login,
                  issues: prViolations,
                });
              }
            }

            if (violations.length > 0) {
              let body = `## PR Review Policy Violations\n\n`;
              body += `**Audit period:** ${sinceISO.split('T')[0]} to ${today}\n`;
              body += `**Violations found:** ${violations.length}\n\n`;
              body += `### Details\n\n`;

              for (const v of violations) {
                body += `- **#${v.number}** — ${v.title} (by ${v.author})\n`;
                for (const issue of v.issues) {
                  body += `  - ${issue}\n`;
                }
              }

              body += `\n---\n\n`;
              body += `Per REVIEW_POLICY.md, these PRs must be retroactively reviewed by a human within one business day.\n\n`;
              body += `cc @nathanjohnpayne`;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Weekly PR Audit — ${today}`,
                body: body,
                labels: ['audit'],
              });

              console.log(`Created audit issue with ${violations.length} violations.`);
            } else {
              console.log('No policy violations found for the past 7 days.');
            }
